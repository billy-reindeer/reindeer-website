# Public repo (free plan: public repos allow unlimited contributors).
[build]
  publish = "."

[[redirects]]
  from = "https://www.reindeerpub.com/*"
  to   = "https://reindeerpub.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://reindeerpub.com/*"
  to   = "https://reindeerpub.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.reindeerpub.com/*"
  to   = "https://reindeerpub.com/:splat"
  status = 301
  force  = true

# 301 redirects from the old WordPress site (preserve SEO). Must stay ABOVE the /* 404 catch-all.
[[redirects]]
  from = "/home/"
  to = "/"
  status = 301
[[redirects]]
  from = "/book-a-table/"
  to = "/book/"
  status = 301
[[redirects]]
  from = "/menus/"
  to = "/menu/"
  status = 301
[[redirects]]
  from = "/food/"
  to = "/menu/"
  status = 301
[[redirects]]
  from = "/whats-on/"
  to = "/events/"
  status = 301
[[redirects]]
  from = "/event-hire/"
  to = "/private-hire/"
  status = 301
[[redirects]]
  from = "/restaurant-garden/"
  to = "/private-hire/"
  status = 301
[[redirects]]
  from = "/shop/"
  to = "/gift-vouchers/"
  status = 301
[[redirects]]
  from = "/basket/"
  to = "/gift-vouchers/"
  status = 301
[[redirects]]
  from = "/newsletter/"
  to = "/contact/"
  status = 301
[[redirects]]
  from = "/the-michelin-guide/"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/frank-sinatra-tribute/"
  to = "/events/"
  status = 301
[[redirects]]
  from = "/thai-night/"
  to = "/events/"
  status = 301
[[redirects]]
  from = "/events/category/*"
  to = "/events/"
  status = 301
[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/category/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/my-account/"
  to = "/"
  status = 301
[[redirects]]
  from = "/gallery/"
  to = "/"
  status = 301

[[redirects]]
  from   = "/*"
  to     = "/404/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://pos.toasttab.com https://www.google.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.facebook.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' data: https://unpkg.com; img-src 'self' data: https: blob:; frame-src 'self'; connect-src 'self' https://api.github.com https://api.netlify.com https://unpkg.com blob:;"
    Cache-Control = "no-store"
